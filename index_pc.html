}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr {
  flex-shrink: 0;
  background: linear-gradient(135deg, #1a6bbf 0%, #2980d4 100%);
  border-bottom: 1px solid #1560a8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: max(14px, env(safe-area-inset-top)) 16px 12px;
}
.hdr-eye {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  color: rgba(255,255,255,0.72);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.hdr-name {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: #ffffff;
  letter-spacing: -.5px;
  line-height: 1;
}
.hdr-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.72);
  margin-top: 3px;
}
.hdr-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.35);
  color: #ffffff;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
.tabs-wrap {
  flex-shrink: 0;
  background: #f7faff;
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  padding: 11px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--text4);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: color .15s;
}
.tab.on {
  color: var(--azul);
  border-bottom-color: var(--azul);
}

/* ═══════════════════════════════════════════
   BARRA DE PROGRESO
═══════════════════════════════════════════ */
.prog-wrap {
  flex-shrink: 0;
  padding: 10px 16px 8px;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
}
.prog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.prog-lbl { font-size: 11px; color: var(--text3); }
.prog-cnt {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--azul);
  font-weight: 500;
}
.prog-track {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--azul), var(--azul-dim));
  border-radius: 2px;
  transition: width .4s ease;
  width: 0%;
}

/* ═══════════════════════════════════════════
   SCROLL BODY
═══════════════════════════════════════════ */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 8px;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
}

/* ═══════════════════════════════════════════
   SECCIONES
═══════════════════════════════════════════ */
.sec { margin-bottom: 6px; }

.sec-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.sec-hdr:active { background: var(--bg3); }
.sec-hdr.open {
  border-radius: var(--radius) var(--radius) 0 0;
  border-bottom-color: transparent;
}
.sec-ico { font-size: 17px; flex-shrink: 0; }
.sec-info { flex: 1; min-width: 0; }
.sec-name { font-size: 12px; font-weight: 600; color: var(--text); }
.sec-sub { font-size: 10px; color: var(--text4); margin-top: 1px; }

.badge {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: .05em;
  flex-shrink: 0;
}
.b-rojo    { background: var(--rojo-bg);    color: var(--rojo);    border: 1px solid #f5c6c3; }
.b-naranja { background: var(--naranja-bg); color: var(--naranja); border: 1px solid #fde8c3; }
.b-azul    { background: var(--azul-bg);    color: var(--azul);    border: 1px solid #b3d4f5; }

.chev {
  font-size: 12px;
  color: var(--text4);
  transition: transform .2s;
  flex-shrink: 0;
}
.chev.open { transform: rotate(180deg); }

/* ═══════════════════════════════════════════
   ITEMS
═══════════════════════════════════════════ */
.items-wrap {
  display: none;
  background: #ffffff;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
}
.items-wrap.open { display: block; }

.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--bg3);
  cursor: pointer;
  transition: background .1s;
}
.item:last-child { border-bottom: none; }
.item:active { background: var(--bg); }
.item.done { background: var(--verde-bg); }

.inum {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text4);
  min-width: 16px;
  padding-top: 2px;
  flex-shrink: 0;
}

.ibox {
  width: 19px;
  height: 19px;
  flex-shrink: 0;
  border: 1.5px solid var(--border2);
  border-radius: 5px;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff;
  transition: all .12s;
}
.ibox.on {
  background: var(--verde-bg);
  border-color: var(--verde);
}
.ibox.on::after {
  content: '';
  display: block;
  width: 5px;
  height: 9px;
  border-right: 2px solid var(--verde);
  border-bottom: 2px solid var(--verde);
  transform: rotate(45deg) translate(-1px,-1px);
}

.itxt {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.48;
}
.itxt.done {
  color: var(--text4);
  text-decoration: line-through;
  text-decoration-color: var(--border2);
}

.utag {
  display: inline-block;
  margin-left: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  vertical-align: middle;
  background: var(--rojo-bg);
  color: var(--rojo);
  border: 1px solid #f5c6c3;
  letter-spacing: .04em;
}

/* ═══════════════════════════════════════════
   BOTTOM BAR
═══════════════════════════════════════════ */
.bottom {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: #ffffff;
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px rgba(26,107,191,.06);
}
.btn {
  flex: 1;
  padding: 11px 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text3);
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.btn:active { opacity: .75; }
.btn-azul {
  background: var(--azul-bg);
  border-color: #93c5fd;
  color: var(--azul);
}
.btn-rojo {
  background: var(--rojo-bg);
  border-color: #f5c6c3;
  color: var(--rojo);
}
.btn-verde {
  background: var(--verde-bg);
  border-color: #bbddc8;
  color: var(--verde);
}

/* ═══════════════════════════════════════════
   MODAL LIMPIAR
═══════════════════════════════════════════ */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(26,47,74,.45);
  align-items: flex-end;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(2px);
}
.modal-bg.show { display: flex; }
.modal {
  background: #ffffff;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px 16px 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(26,107,191,.15);
}
.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 18px;
  line-height: 1.5;
}
.modal-btns { display: flex; gap: 8px; }
.modal-cancel {
  flex: 1;
  padding: 11px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
}
.modal-ok {
  flex: 1;
  padding: 11px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: var(--rojo);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
}

/* ── Panel datos del caso ── */
.caso-panel {
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  padding: 10px 12px 8px;
  flex-shrink: 0;
}
.caso-titulo {
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 7px;
  font-family: 'DM Mono', monospace;
}
.caso-fields {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}
.caso-field {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.caso-field.full { grid-column: 1 / -1; }
.caso-label {
  font-size: 9px;
  font-weight: 500;
  color: var(--text4);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.caso-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  width: 100%;
  outline: none;
  transition: border-color .15s;
}
.caso-input:focus { border-color: var(--azul); background: #fff; }
.caso-input::placeholder { color: var(--text4); font-size: 11px; }
</style>

// NAVEGACIÓN DE TABS
// ════════════════════════════════════════════════════════════════
function gTab(t, btn) {
  tab = t;
  expanded = false;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('expbtn').textContent = '↕ Expandir';
  closeModal();
  render();
  prog();
}

function render() {
  const body = document.getElementById('body');
  body.innerHTML = '';

  D[tab].s.forEach((sec, si) => {
    const sid     = tab + '_' + si;
    const isFirst = (si === 0);

    // Sección contenedor
    const wrap = document.createElement('div');
    wrap.className = 'sec';

    // Encabezado de sección
    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr' + (isFirst ? ' open' : '');
    hdr.id = 'h_' + sid;
    hdr.setAttribute('role', 'button');
    hdr.setAttribute('tabindex', '0');
    hdr.onclick = () => toggleSec(sid);
    hdr.innerHTML =
      '<span class="sec-ico">' + sec.ic + '</span>' +
      '<div class="sec-info">' +
        '<div class="sec-name">' + sec.n + '</div>' +
        '<div class="sec-sub">' + sec.it.length + ' medidas</div>' +
      '</div>' +
      '<span class="badge ' + sec.bc + '">' + sec.b + '</span>' +
      '<span class="chev ' + (isFirst ? 'open' : '') + '" id="c_' + sid + '">▾</span>';

    // Lista de ítems
    const iw = document.createElement('div');
    iw.className = 'items-wrap' + (isFirst ? ' open' : '');
    iw.id = 'iw_' + sid;

    sec.it.forEach((item, ii) => {
      const k    = key(tab, si, ii);
      const done = !!ck[k];
      const row  = document.createElement('div');
      row.className = 'item' + (done ? ' done' : '');
      row.id = 'r_' + k;
      row.setAttribute('role', 'checkbox');
      row.setAttribute('aria-checked', String(done));
      row.onclick = () => toggle(tab, si, ii);
      row.innerHTML =
        '<span class="inum">' + (ii + 1) + '</span>' +
        '<div class="ibox' + (done ? ' on' : '') + '" id="b_' + k + '" aria-hidden="true"></div>' +
        '<span class="itxt' + (done ? ' done' : '') + '" id="t_' + k + '">' +
          item.t + (item.u ? '<span class="utag">URGENTE</span>' : '') +
        '</span>';
      iw.appendChild(row);
    });

    wrap.appendChild(hdr);
    wrap.appendChild(iw);
    body.appendChild(wrap);
  });
}

// ════════════════════════════════════════════════════════════════
// TOGGLE SECCIÓN
// ════════════════════════════════════════════════════════════════
function toggleSec(sid) {
  const iw   = document.getElementById('iw_' + sid);
  const hdr  = document.getElementById('h_'  + sid);
  const chev = document.getElementById('c_'  + sid);
  const open = iw.classList.contains('open');
  iw.classList.toggle('open',  !open);
  hdr.classList.toggle('open', !open);
  chev.classList.toggle('open',!open);
}

// ════════════════════════════════════════════════════════════════
// MARCAR / DESMARCAR ÍTEM
// ════════════════════════════════════════════════════════════════
function toggle(t, s, i) {
  const k   = key(t, s, i);
  ck[k]     = !ck[k];
  const box = document.getElementById('b_' + k);
  const txt = document.getElementById('t_' + k);
  const row = document.getElementById('r_' + k);
  if (box) box.classList.toggle('on',   !!ck[k]);
  if (txt) txt.classList.toggle('done', !!ck[k]);
  if (row) {
    row.classList.toggle('done', !!ck[k]);
    row.setAttribute('aria-checked', String(!!ck[k]));
  }
  prog();
}

// ════════════════════════════════════════════════════════════════
// BARRA DE PROGRESO
// ════════════════════════════════════════════════════════════════
function prog() {
  let tot = 0, done = 0;
  D[tab].s.forEach((s, si) =>
    s.it.forEach((_, ii) => { tot++; if (ck[key(tab, si, ii)]) done++; })
  );
  document.getElementById('pcnt').textContent = done + ' / ' + tot;
  const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plbl').textContent =
    pct === 100 ? '✓ Protocolo completo' : 'Medidas completadas';
}

// ════════════════════════════════════════════════════════════════
// EXPANDIR / COLAPSAR TODO
// ════════════════════════════════════════════════════════════════
function toggleAll() {
  expanded = !expanded;
  document.querySelectorAll('.items-wrap').forEach(el => el.classList.toggle('open', expanded));
  document.querySelectorAll('.sec-hdr').forEach(el   => el.classList.toggle('open', expanded));
  document.querySelectorAll('.chev').forEach(el       => el.classList.toggle('open', expanded));
  document.getElementById('expbtn').textContent = expanded ? '↕ Colapsar' : '↕ Expandir';
}

// ════════════════════════════════════════════════════════════════
// MODAL LIMPIAR
// ════════════════════════════════════════════════════════════════
function askReset()  { document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function doReset() {
  closeModal();
  D[tab].s.forEach((s, si) => s.it.forEach((_, ii) => { ck[key(tab, si, ii)] = false; }));
  // Limpiar también los datos del caso (fecha, N° de causa, usuario, dato relevante)
  document.getElementById('caso-fecha').value   = '';
  document.getElementById('caso-numero').value  = '';
  document.getElementById('caso-usuario').value = '';
  document.getElementById('caso-dato').value    = '';
  render();
  prog();
}

// ════════════════════════════════════════════════════════════════
// EXPORTAR PDF — genera documento descargable
// ════════════════════════════════════════════════════════════════
function getDatosCaso() {
  const fecha   = document.getElementById('caso-fecha').value;
  const numero  = document.getElementById('caso-numero').value.trim();
  const usuario = document.getElementById('caso-usuario').value.trim();
  const dato    = document.getElementById('caso-dato').value.trim();
  const fechaFmt = fecha
    ? new Date(fecha + 'T12:00:00').toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})
    : '';
  const ahora = new Date();
  const horaEnvio = ahora.toLocaleString('es-AR', {
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
  return { fecha: fechaFmt, numero, usuario, dato, horaEnvio };
}

// ════════════════════════════════════════════════════════════════
// GENERAR PDF — construye el documento y ejecuta la acción pedida
// ════════════════════════════════════════════════════════════════
function exportPDF() {
  generarPdf('compartir', 'btnExportar');
}

function imprimirPDF() {
  generarPdf('imprimir', 'btnImprimir');
}

function generarPdf(accion, btnId) {
  const secs   = D[tab].s;
  const nombre = NOMBRES[tab];
  const dc     = getDatosCaso();

  // Filtrar solo medidas marcadas, agrupadas por sección
  const seccionesPdf = [];
  let totalMarcadas = 0;
  secs.forEach((sec, si) => {
    const itemsMarcados = sec.it.filter((item, ii) => !!ck[key(tab, si, ii)]);
    if (itemsMarcados.length === 0) return;
    totalMarcadas += itemsMarcados.length;
    seccionesPdf.push({
      nombre: sec.n,
      badge: sec.b,
      items: itemsMarcados.map(item => ({ texto: item.t, urgente: !!item.u }))
    });
  });

  if (totalMarcadas === 0) {
    alert('No hay medidas marcadas. Tildá las medidas ordenadas antes de exportar.');
    return;
  }

  const btn = document.getElementById(btnId);
  const textoOriginal = btn ? btn.innerHTML : '';

  const jsPDFLib = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : window.jsPDF;
  if (typeof jsPDFLib === 'undefined') {
    alert('No se pudo cargar el generador de PDF — verificá tu conexión a internet e intentá de nuevo.');
    return;
  }

  if (btn) { btn.innerHTML = accion === 'imprimir' ? '⏳ Preparando...' : '⏳ Generando...'; btn.disabled = true; }

  // Pequeño delay para que el navegador pinte el estado antes de bloquear con el cálculo
  setTimeout(() => {
    try {
      const sufijoNumero = dc.numero ? '_' + dc.numero.replace(/[^a-zA-Z0-9]/g, '-') : '';
      const nombreArchivo = `Vestigium_${nombre.replace(/\s+/g,'_')}${sufijoNumero}.pdf`;

      const doc = new jsPDFLib({ unit: 'mm', format: 'a4', orientation: 'portrait' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const marginX = 14;
      const maxW = pageW - marginX * 2;
      let y = 18;

      const COL = {
        azul: [26, 107, 191], texto: [26, 47, 74], gris: [90, 122, 154],
        verde: [21, 128, 61], rojo: [192, 57, 43], naranja: [180, 83, 9],
        blanco: [255, 255, 255], fondo: [240, 246, 255],
      };

      function checkPageBreak(espacioNecesario) {
        if (y + espacioNecesario > pageH - 16) { doc.addPage(); y = 18; }
      }

      // Header azul
      doc.setFillColor(...COL.azul);
      doc.rect(0, 0, pageW, 26, 'F');
      doc.setTextColor(...COL.blanco);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.text('VESTIGIUM — GUÍA DE ACTUACIÓN INVESTIGATIVA', marginX, 8);
      doc.setFontSize(17);
      doc.text('Vestigium', marginX, 16);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.text(nombre, marginX, 22.5);
      y = 33;

      // Datos del caso
      const tieneDatos = dc.fecha || dc.numero || dc.usuario || dc.dato;
      if (tieneDatos) {
        const lineas = [];
        if (dc.fecha)   lineas.push(['Fecha del hecho', dc.fecha]);
        if (dc.numero)  lineas.push(['N° de causa', dc.numero]);
        if (dc.usuario) lineas.push(['Usuario que ordena', dc.usuario]);
        if (dc.dato)    lineas.push(['Dato relevante', dc.dato]);

        const altoCaja = 6 + lineas.length * 9;
        checkPageBreak(altoCaja + 4);
        doc.setFillColor(...COL.fondo);
        doc.setDrawColor(204, 221, 245);
        doc.roundedRect(marginX, y, maxW, altoCaja, 2, 2, 'FD');
        let yc = y + 6;
        lineas.forEach(([label, valor]) => {
          doc.setFontSize(7);
          doc.setTextColor(...COL.gris);
          doc.text(label.toUpperCase(), marginX + 4, yc);
          doc.setFontSize(10);
          doc.setTextColor(...COL.texto);
          doc.setFont('helvetica', 'bold');
          doc.text(String(valor), marginX + 4, yc + 4.2);
          doc.setFont('helvetica', 'normal');
          yc += 9;
        });
        y += altoCaja + 6;
      }

      // Secciones y medidas
      const badgeColor = {
        URGENTE: COL.rojo, IRREPRODUCIBLE: COL.rojo,
        PRIORITARIO: COL.naranja, GESTIONAR: COL.azul
      };
      let contadorGlobal = 0;

      seccionesPdf.forEach(sec => {
        checkPageBreak(12);
        const color = badgeColor[sec.badge] || COL.azul;

        doc.setFillColor(...COL.fondo);
        doc.rect(marginX, y, maxW, 7, 'F');
        doc.setDrawColor(...color);
        doc.setLineWidth(0.8);
        doc.line(marginX, y, marginX, y + 7);
        doc.setLineWidth(0.2);

        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...COL.texto);
        doc.text(sec.nombre, marginX + 3, y + 4.8);

        const badgeTexto = `${sec.badge} · ${sec.items.length} medida${sec.items.length>1?'s':''}`;
        doc.setFontSize(7);
        doc.setTextColor(...color);
        doc.text(badgeTexto, pageW - marginX, y + 4.8, { align: 'right' });
        y += 10;

        sec.items.forEach(item => {
          contadorGlobal++;
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);

          const numTxt = `${contadorGlobal}.`;
          const textoCompleto = item.urgente ? `${item.texto}  [URGENTE]` : item.texto;
          const wrapped = doc.splitTextToSize(textoCompleto, maxW - 16);
          const altoItem = wrapped.length * 4.6 + 2;

          checkPageBreak(altoItem + 2);

          doc.setTextColor(...COL.azul);
          doc.setFont('helvetica', 'bold');
          doc.text(numTxt, marginX, y + 3.5);

          // Checkbox tildado dibujado con vectores (evita glifos Unicode rotos)
          doc.setFillColor(...COL.verde);
          doc.roundedRect(marginX + 7, y + 0.8, 3.6, 3.6, 0.6, 0.6, 'F');
          doc.setDrawColor(255, 255, 255);
          doc.setLineWidth(0.5);
          doc.line(marginX + 7.7, y + 2.7, marginX + 8.5, y + 3.6);
          doc.line(marginX + 8.5, y + 3.6, marginX + 10.1, y + 1.4);
          doc.setLineWidth(0.2);

          doc.setFont('helvetica', 'normal');
          doc.setTextColor(...COL.texto);
          let yLine = y + 3.5;
          wrapped.forEach((linea, idx) => {
            if (idx === wrapped.length - 1 && item.urgente) {
              const sinTag = linea.replace('  [URGENTE]', '');
              doc.setTextColor(...COL.texto);
              doc.text(sinTag, marginX + 12, yLine);
              const anchoSinTag = doc.getTextWidth(sinTag);
              doc.setFontSize(8);
              doc.setFont('helvetica', 'bold');
              doc.setTextColor(...COL.rojo);
              doc.text('URGENTE', marginX + 12 + anchoSinTag + 2, yLine);
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(10);
            } else {
              doc.text(linea, marginX + 12, yLine);
            }
            yLine += 4.6;
          });
          y += altoItem;

          doc.setDrawColor(232, 240, 251);
          doc.line(marginX, y, pageW - marginX, y);
          y += 1.5;
        });
        y += 3;
      });

      // Footer resumen
      checkPageBreak(14);
      doc.setFillColor(...COL.fondo);
      doc.roundedRect(marginX, y, maxW, 11, 2, 2, 'F');
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...COL.texto);
      doc.text(nombre, marginX + 4, y + 7);
      const anchoNombre = doc.getTextWidth(nombre);
      doc.setTextColor(...COL.verde);
      doc.text(`· ${totalMarcadas} medidas ordenadas`, marginX + 4 + anchoNombre + 2, y + 7);

      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...COL.gris);
      doc.text(`Vestigium v2.3  |  Enviado: ${dc.horaEnvio}`, pageW - marginX, y + 7, { align: 'right' });

      // ── Generar el Blob y ejecutar la acción solicitada ──
      const pdfBlob = doc.output('blob');
      if (accion === 'imprimir') {
        imprimirBlobPdf(pdfBlob, btn, textoOriginal);
      } else {
        compartirOdescargarPdf(pdfBlob, nombreArchivo, btn, textoOriginal);
      }

    } catch (err) {
      if (btn) { btn.innerHTML = textoOriginal; btn.disabled = false; }
      alert('Ocurrió un error generando el PDF. Probá de nuevo.');
      console.error('Vestigium PDF error:', err);
    }
  }, 50);
}

// ── Abre el PDF en una pestaña nueva lista para imprimir ──────────────────
function imprimirBlobPdf(blob, btn, textoOriginal) {
  const restaurarBoton = () => { if (btn) { btn.innerHTML = textoOriginal; btn.disabled = false; } };
  try {
    const url = URL.createObjectURL(blob);
    const ventana = window.open(url, '_blank');
    if (!ventana) {
      alert('El navegador bloqueó la ventana de impresión. Habilitá las ventanas emergentes para Vestigium e intentá de nuevo.');
      restaurarBoton();
      return;
    }
    // Disparar el diálogo de impresión nativo del visor de PDF del navegador
    ventana.addEventListener('load', () => {
      setTimeout(() => { try { ventana.print(); } catch (e) {} }, 300);
    });
    restaurarBoton();
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch (err) {
    restaurarBoton();
    alert('No se pudo abrir el PDF para imprimir. Probá de nuevo.');
    console.error('Vestigium print error:', err);
  }
}

// ── Comparte el PDF con el menú nativo del sistema, o lo descarga ─────────
function compartirOdescargarPdf(blob, nombreArchivo, btn, textoOriginal) {
  const restaurarBoton = () => { if (btn) { btn.innerHTML = textoOriginal; btn.disabled = false; } };

  // Versión PC: siempre descarga directa, nunca usa el menú de compartir
  // (en computadoras de escritorio Web Share no aporta nada útil).
  descargarBlobDirecto(blob, nombreArchivo);
  restaurarBoton();
}

function descargarBlobDirecto(blob, nombreArchivo) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = nombreArchivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

render();
prog();
</script>
